name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          FORMULA="${{ github.event.client_payload.formula }}"

          echo "Updating formula to ${TAG}..."
          echo "${FORMULA}" | base64 -d > Formula/ntech-team-kit.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ntech-team-kit.rb
          git commit -m "chore: update ntech-team-kit to ${TAG}" || echo "No formula changes"
          git push origin main

          echo "Tap formula updated to ${TAG}!"

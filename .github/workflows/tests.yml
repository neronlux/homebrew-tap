name: Test Formulae

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_run:
    workflows: ["Update Formula"]
    types: [completed]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        formula: [ntech-team-kit]
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Link tap into Homebrew
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/neronlux"
          mkdir -p "$TAP_DIR"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR/homebrew-tap"

      - name: Install formula
        run: brew install --build-from-source neronlux/tap/${{ matrix.formula }}

      - name: Test formula
        run: brew test ${{ matrix.formula }}
